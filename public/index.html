<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus 逆アキネーター</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <div id="app">

        <!-- ========== タイトル画面 ========== -->
        <section id="title-screen" class="screen active">
            <div class="title-inner">
                <div class="title-deco"></div>
                <h1>Limbus<br>逆アキネーター</h1>
                <p>システムが人格を一体選ぶ。<br>質問で情報を集め、その人格を当てよ。</p>
                <div class="title-buttons">
                    <button id="btn-to-select" class="btn-primary">開始</button>
                    <button id="btn-to-db" class="btn-secondary">DB閲覧</button>
                </div>
            </div>
        </section>

        <!-- ========== DB閲覧画面 ========== -->
        <section id="db-screen" class="screen">
            <div class="db-header">
                <button id="btn-back-from-db" class="btn-secondary">戻る</button>
                <h2>データベース閲覧</h2>
                <select id="db-category-select" class="db-select">
                    <option value="identities">人格データ</option>
                    <option value="keywords">キーワード</option>
                    <option value="affiliations">所属</option>
                    <option value="characteristics">特性キーワード</option>
                </select>
                <input type="text" id="db-search" placeholder="検索...">
            </div>
            <div class="db-table-wrapper">
                <table id="db-table" class="db-table">
                    <thead id="db-thead">
                        <!-- JSで動的生成 -->
                    </thead>
                    <tbody id="db-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- ========== 人格選択画面 ========== -->
        <section id="selection-screen" class="screen">
            <div class="selection-header">
                <h2>候補プールの編集</h2>
                <p>ゲームに登場する人格を選んでください（デフォルトは全選択）</p>
                <div class="selection-controls">
                    <button id="btn-select-all" class="btn-secondary">全選択</button>
                    <button id="btn-deselect-all" class="btn-secondary">全解除</button>
                </div>
            </div>
            <div id="identity-list-container" class="checkbox-list"></div>
            <div class="selection-footer">
                <button id="btn-start-game" class="btn-primary">ゲーム開始</button>
            </div>
        </section>

        <!-- ========== ゲーム画面 ========== -->
        <section id="game-screen" class="screen">

            <!-- ヘッダー -->
            <header class="game-header">
                <button id="btn-back-to-select" class="btn-secondary">設定</button>
                <span class="game-title">Limbus 逆アキネーター</span>
                <button id="btn-new-game" class="btn-secondary">新しいゲーム</button>
            </header>

            <!-- メインエリア -->
            <div class="game-main">

                <!-- 左：チャット欄 -->
                <div class="game-left">
                    <div id="chat-log" class="chat-log">
                        <div class="msg msg-system">
                            ゲーム開始。右の質問一覧から項目を選んで情報を集めよ。
                        </div>
                    </div>
                </div>

                <!-- 右：質問一覧 -->
                <div class="game-right">
                    <div class="questions-panel">
                        <div class="panel-title">質問一覧</div>
                        <div id="question-list" class="question-list">
                            <!-- JS で生成 -->
                        </div>
                    </div>
                </div>

            </div>

            <!-- フッター -->
            <div class="game-footer">

                <!-- 左下：入力欄 -->
                <div class="footer-left">
                    <div id="active-q-label" class="active-q-label">← 質問一覧から項目を選んでください</div>
                    <div class="input-row">
                        <!-- 動的テンプレート用コンテナ -->
                        <div id="template-container" class="template-container">
                            <span class="template-placeholder">質問を選ぶとここに入力枠が表示されます</span>
                        </div>
                        <button id="btn-send" class="btn-primary" disabled>送信</button>
                    </div>
                </div>

                <!-- 右下：回答ボタン -->
                <div class="footer-right">
                    <div class="panel-title">回答する</div>
                    <div class="answer-row">
                        <div class="select-wrapper">
                            <input type="text" id="answer-search" placeholder="人格名で検索..." autocomplete="off">
                            <div id="answer-dropdown" class="answer-dropdown"></div>
                        </div>
                        <button id="btn-submit-answer" class="btn-accent">回答</button>
                    </div>
                    <div id="selected-answer-label" class="selected-answer-label">未選択</div>
                </div>

            </div>
        </section>

        <!-- ========== 結果モーダル ========== -->
        <div id="result-modal" class="modal">
            <div class="modal-box">
                <h2 id="result-title"></h2>
                <p id="result-message"></p>
                <button id="btn-close-modal" class="btn-primary">閉じる</button>
            </div>
        </div>

    </div>
    <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
